services:
  mysql:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    image: futureradius-mysql:local
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-radius}
      MYSQL_INITDB_SKIP_TZINFO: "1"
      # Must match api/freeradius so CREATE USER uses the same secret as rlm_sql (see z-futureradius-followup.sh).
      RADIUS_DB_USER: ${RADIUS_DB_USER:-radius}
      RADIUS_DB_PASSWORD: ${RADIUS_DB_PASSWORD:?set RADIUS_DB_PASSWORD in .env}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # RADIUS auth/accounting: 1812/1813 UDP on the host. Use host networking so packets destined to the
  # WireGuard server IP (e.g. 10.20.0.1 on wg0) reach radiusd. Published ports + docker-proxy often do
  # NOT receive UDP to a secondary/WG local address — MikroTik then sees "radius timeout" while tcpdump
  # on wg0 shows Access-Request. MySQL is reached via 127.0.0.1 because mysql publishes 127.0.0.1:3306.
  freeradius:
    build:
      context: .
      dockerfile: docker/freeradius/Dockerfile
    image: futureradius-freeradius:local
    network_mode: host
    environment:
      MYSQL_HOST: 127.0.0.1
      MYSQL_USER: ${RADIUS_DB_USER:-radius}
      MYSQL_PASSWORD: ${RADIUS_DB_PASSWORD:?set RADIUS_DB_PASSWORD in .env}
      FREERADIUS_DEBUG: ${FREERADIUS_DEBUG:-0}
      # After a full SQL restore, MySQL may still be busy; give it extra settle time before radiusd.
      MYSQL_SETTLE_SEC: ${FREERADIUS_MYSQL_SETTLE_SEC:-8}
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep freeradius >/dev/null 2>&1 || pgrep radiusd >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # WAHA listens on 3000 inside the container; host 3001 avoids clashing with the API (3000).
  waha:
    image: devlikeapro/waha:latest
    ports:
      - "3001:3000"
    environment:
      WAHA_PRINT_QR: "true"
      WAHA_LOG_LEVEL: "info"
      WAHA_API_KEY: ${WAHA_API_KEY:?set WAHA_API_KEY in .env}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME:?set WAHA_DASHBOARD_USERNAME in .env}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:?set WAHA_DASHBOARD_PASSWORD in .env}
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME:?set WHATSAPP_SWAGGER_USERNAME in .env}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD:?set WHATSAPP_SWAGGER_PASSWORD in .env}
    volumes:
      - waha_sessions:/app/.sessions
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-radius}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      AES_SECRET_KEY: ${AES_SECRET_KEY:?set AES_SECRET_KEY in .env}
      DEFAULT_TENANT_ID: 00000000-0000-0000-0000-000000000001
      PORT: "3000"
      BACKUP_DIR: /app/backups
      BACKUP_RETENTION_DAYS: "7"
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Damascus}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      PUBLIC_FRONTEND_URL: ${PUBLIC_FRONTEND_URL:-http://localhost:8080}
      # Required when NODE_ENV=production (set in api Dockerfile). Override in .env for LAN/domain.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173}
      GOOGLE_BACKUP_CLIENT_ID: ${GOOGLE_BACKUP_CLIENT_ID:-}
      GOOGLE_BACKUP_CLIENT_SECRET: ${GOOGLE_BACKUP_CLIENT_SECRET:-}
      WAHA_API_KEY: ${WAHA_API_KEY:?set WAHA_API_KEY in .env}
      WAHA_INTERNAL_URL: ${WAHA_INTERNAL_URL:-http://waha:3000}
      WAHA_SESSION_NAME: ${WAHA_SESSION_NAME:-default}
      RADIUS_DB_USER: ${RADIUS_DB_USER:-radius}
      RADIUS_DB_PASSWORD: ${RADIUS_DB_PASSWORD:?set RADIUS_DB_PASSWORD in .env}
      SQL_MIGRATIONS_DIR: /app/sql/migrations
      DMA_MODE: ${DMA_MODE:-true}
      WIREGUARD_RUNTIME_DIR: /app/runtime/wireguard
      APP_UPDATE_ENABLED: ${APP_UPDATE_ENABLED:-false}
      APP_UPDATE_TOKEN: ${APP_UPDATE_TOKEN:-}
      APP_UPDATE_REMOTE: ${APP_UPDATE_REMOTE:-origin}
      APP_UPDATE_BRANCH: ${APP_UPDATE_BRANCH:-main}
      APP_UPDATE_REPO_DIR: ${APP_UPDATE_REPO_DIR:-/workspace/future-radius}
      APP_UPDATE_DOCKER_ENABLED: ${APP_UPDATE_DOCKER_ENABLED:-true}
      APP_UPDATE_COMPOSE_DIR: ${APP_UPDATE_COMPOSE_DIR:-/workspace/future-radius}
      APP_UPDATE_COMPOSE_FILE: ${APP_UPDATE_COMPOSE_FILE:-}
      APP_UPDATE_GIT_BIN: ${APP_UPDATE_GIT_BIN:-git}
      APP_UPDATE_COMPOSE_BIN: ${APP_UPDATE_COMPOSE_BIN:-}
      APP_UPDATE_COMPOSE_REMOVE_ORPHANS: ${APP_UPDATE_COMPOSE_REMOVE_ORPHANS:-true}
      APP_UPDATE_COMPOSE_RETRY_RECYCLE_ON_PORT_CONFLICT: ${APP_UPDATE_COMPOSE_RETRY_RECYCLE_ON_PORT_CONFLICT:-true}
      APP_UPDATE_COMPOSE_RECYCLE_SERVICES: ${APP_UPDATE_COMPOSE_RECYCLE_SERVICES:-mysql,waha}
      # Explicit stack name so updates recycle the same containers that bind 3306/3001 (else orphan/other-project binds cause persistent conflicts).
      APP_UPDATE_COMPOSE_PROJECT_NAME: ${APP_UPDATE_COMPOSE_PROJECT_NAME:-}
      APP_UPDATE_COMPOSE_RECYCLE_MAX_PASSES: ${APP_UPDATE_COMPOSE_RECYCLE_MAX_PASSES:-2}
      APP_UPDATE_COMPOSE_KILL_BEFORE_RECYCLE: ${APP_UPDATE_COMPOSE_KILL_BEFORE_RECYCLE:-false}
    volumes:
      - backup_data:/app/backups
      - ./sql:/app/sql:ro
      - wireguard_runtime:/app/runtime/wireguard
      - ./:/workspace/future-radius
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Use Node (always present); curl may be missing in older api images → permanent unhealthy.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s
    restart: unless-stopped

  api-proxy:
    image: nginx:1.27-alpine
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx/api-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
    restart: unless-stopped

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: ["node", "dist/workers/index.js"]
    environment:
      DMA_MODE: ${DMA_MODE:-true}
      SKIP_BULLMQ_UPDATE_USAGE: ${SKIP_BULLMQ_UPDATE_USAGE:-0}
      MIKROTIK_API_SYNC_MS: ${MIKROTIK_API_SYNC_MS:-0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173}
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-radius}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      AES_SECRET_KEY: ${AES_SECRET_KEY:?set AES_SECRET_KEY in .env}
      DEFAULT_TENANT_ID: 00000000-0000-0000-0000-000000000001
      BACKUP_DIR: /app/backups
      BACKUP_RETENTION_DAYS: "7"
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Damascus}
      WAHA_API_KEY: ${WAHA_API_KEY:?set WAHA_API_KEY in .env}
      WAHA_INTERNAL_URL: ${WAHA_INTERNAL_URL:-http://waha:3000}
      WAHA_SESSION_NAME: ${WAHA_SESSION_NAME:-default}
    volumes:
      - backup_data:/app/backups
      - ./sql:/app/sql:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Optional: isolate usage/quota/CoA cycles from other BullMQ jobs (profile: split-workers).
  # Set SKIP_BULLMQ_UPDATE_USAGE=1 on the main `worker` when using this service.
  worker-usage:
    profiles: ["split-workers"]
    build:
      context: ./api
      dockerfile: Dockerfile
    command: ["node", "dist/workers/usage-standalone.js"]
    environment:
      DMA_MODE: ${DMA_MODE:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173}
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-radius}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      AES_SECRET_KEY: ${AES_SECRET_KEY:?set AES_SECRET_KEY in .env}
      DEFAULT_TENANT_ID: 00000000-0000-0000-0000-000000000001
      UPDATE_USAGE_EVERY_MS: ${UPDATE_USAGE_EVERY_MS:-60000}
    volumes:
      - ./sql:/app/sql:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Admin UI: nginx serves on 80 in-container; browse http://HOST:8080
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      api-proxy:
        condition: service_healthy
    restart: unless-stopped

  # phpMyAdmin: browse the MySQL database at http://HOST:8081
  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_AUTH_TYPE: cookie
      PMA_ALLOW_NO_PASSWORD: "0"
      UPLOAD_LIMIT: 512M
    volumes:
      - ./docker/phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  wireguard:
    build:
      context: .
      dockerfile: docker/wireguard/Dockerfile
    image: futureradius-wireguard:local
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      WIREGUARD_RUNTIME_DIR: /var/lib/futureradius/wireguard
      WIREGUARD_NAT_INTERFACE: ${WIREGUARD_NAT_INTERFACE:-eth0}
    volumes:
      - wireguard_runtime:/var/lib/futureradius/wireguard
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  backup_data:
  waha_sessions:
  wireguard_runtime:
