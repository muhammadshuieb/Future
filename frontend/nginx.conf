# Docker embedded DNS — re-resolve `api` when scaling replicas (`docker compose up --scale api=N`).
resolver 127.0.0.11 valid=10s ipv6=off;

upstream futureradius_api {
    zone futureradius_api_up 64k;
    least_conn;
    server api:3000 resolve;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # رفع نسخ SQL كبيرة (مثل radius.sql حتى ~2GB) — بدونها nginx يعيد 413
    client_max_body_size 2G;
    client_body_buffer_size 256k;

    location /api/ {
        proxy_pass http://futureradius_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        send_timeout 7200s;
    }

    location /ws {
        proxy_pass http://futureradius_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://futureradius_api/health;
    }

    # PWA: allow the browser to pick up new service workers and manifest after deploy
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Hashed bundles — safe to cache forever. Must be before `location /`.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # After rebuilds, browsers must not keep an old shell that references deleted /assets/*.js (white screen).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
