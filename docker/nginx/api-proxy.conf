# Login rate limits are enforced in Node (express-rate-limit). Nginx limits here
# caused long waits (10r/m) and 429s that the SPA showed as "wrong password".
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/s;

resolver 127.0.0.11 valid=10s ipv6=off;

upstream futureradius_api {
  zone futureradius_api_up 64k;
  least_conn;
  server api:3000 resolve;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 2g;
  limit_req_status 429;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /api/auth/login {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://futureradius_api;
  }

  location = /api/user/login {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://futureradius_api;
  }

  location /ws {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://futureradius_api;
  }

  location = /health {
    access_log off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_pass http://futureradius_api/health;
  }

  location / {
    limit_req zone=api_limit burst=80 nodelay;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://futureradius_api;
  }
}
