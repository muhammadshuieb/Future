global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: future-radius
    env: ${ENV:-prod}

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # API service exposes /metrics on the same port (3000) it serves the panel.
  # Bearer auth applies only when METRICS_BEARER_TOKEN is set in the api environment.
  - job_name: futureradius-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:3000"]
        labels:
          component: api
    # Uncomment + set in env when METRICS_BEARER_TOKEN is configured:
    # authorization:
    #   credentials_file: /etc/prometheus/api_token

  # Worker exposes its own /metrics on dedicated port 9101 to avoid conflicting
  # with the api process registry (separate Node.js processes).
  - job_name: futureradius-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9101"]
        labels:
          component: worker

  # Scrape Prometheus itself (self-monitoring) — keeps tsdb stats visible.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
