# Included from radiusd.conf. Moderate defaults for Docker (avoids spawning many idle
# workers at once right after MySQL comes back from a heavy restore). Raise in a custom
# file if you run very high packet rates on bare metal.
max_requests = 4096

thread pool {
    start_servers = 4
    max_servers = 32
    min_spare_servers = 2
    max_spare_servers = 10
    max_requests_per_server = 0
}
