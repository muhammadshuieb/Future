global:
  resolve_timeout: 5m

route:
  receiver: futureradius-whatsapp
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 2m
  repeat_interval: 6h
  routes:
    - matchers:
        - severity = "critical"
      receiver: futureradius-whatsapp
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 30m

receivers:
  - name: futureradius-whatsapp
    webhook_configs:
      # Alertmanager reaches the API on the compose network (not published to the host).
      # Bearer auth is not set here: Alertmanager does not expand shell-style ${VAR} in YAML.
      # When ALERT_WEBHOOK_TOKEN is set on the API, add a matching secret via your own image
      # or an envsubst entrypoint; until then the API accepts unsigned webhooks on this path.
      - url: "http://api:3000/api/internal/alerts"
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname"]
